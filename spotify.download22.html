<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Downloader Pro</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1db954, #121212);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .app {
      background: rgba(0,0,0,0.85);
      padding: 30px;
      border-radius: 15px;
      width: 360px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h2 {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #1db954;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #17a74a;
    }

    .loader {
      margin-top: 15px;
      display: none;
    }

    .result {
      margin-top: 20px;
    }

    a.download {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #1db954;
      border-radius: 6px;
      text-decoration: none;
      color: white;
    }
  </style>
</head>

<body>

  <div class="app">
    <h2>🎧 Spotify Downloader</h2>

    <input id="link" type="text" placeholder="Paste Spotify song link..." />
    <button onclick="handleDownload()">Get Song</button>

    <div class="loader" id="loader">⏳ Loading...</div>
    <div class="result" id="result"></div>
  </div>

  <script>
    function isValidSpotifyLink(url) {
      return url.includes("spotify.com/track");
    }

    async function handleDownload() {
      const input = document.getElementById("link").value.trim();
      const loader = document.getElementById("loader");
      const result = document.getElementById("result");

      result.innerHTML = "";

      if (!input) {
        result.innerHTML = "⚠️ Please enter a link.";
        return;
      }

      if (!isValidSpotifyLink(input)) {
        result.innerHTML = "❌ Invalid Spotify track link.";
        return;
      }

      loader.style.display = "block";

      try {
        const response = await fetch(
          "https://spotify-downloader9.p.rapidapi.com/downloadSong?songId=" + encodeURIComponent(input),
          {
            method: "GET",
            headers: {
              "X-RapidAPI-Key": "YOUR_RAPIDAPI_KEY",
              "X-RapidAPI-Host": "spotify-downloader9.p.rapidapi.com"
            }
          }
        );

        const data = await response.json();
        loader.style.display = "none";

        if (data.success) {
          result.innerHTML = `
            <h3>${data.title}</h3>
            <p>${data.artist}</p>
            <a class="download" href="${data.downloadLink}" target="_blank">
              ⬇ Download
            </a>
          `;
        } else {
          result.innerHTML = "❌ Could not fetch song.";
        }

      } catch (err) {
        loader.style.display = "none";
        result.innerHTML = "⚠️ Network error.";
        console.error(err);
      }
    }
  </script>

</body>
</html>
